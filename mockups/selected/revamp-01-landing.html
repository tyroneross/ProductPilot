<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProductPilot — From idea to implementation docs in minutes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:               #110f0d;
      --surface:          #1a1714;
      --surface-elevated: #231f1b;
      --border:           rgba(200,180,160,0.08);
      --text-primary:     #f5f0eb;
      --text-secondary:   #a89a8c;
      --text-muted:       #6b5d52;
      --accent:           #f0b65e;
      --accent-hover:     #d4a04e;
    }

    /* ── Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Background glow (fixed) ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 600px 400px at 50% 40%, rgba(240,182,94,0.04), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      display: flex;
      align-items: center;
      /* backdrop-blur applied via class added on scroll — but since no JS,
         apply a static subtle blur so it degrades gracefully */
      background: rgba(17,15,13,0.72);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      backdrop-filter: blur(12px) saturate(1.2);
      border-bottom: 1px solid var(--border);
    }

    nav .nav-inner {
      max-width: 64rem; /* ~1024px, ~max-w-5xl */
      width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Wordmark */
    .wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* Amber diamond logo mark */
    .wordmark-diamond {
      width: 10px;
      height: 10px;
      background: var(--accent);
      transform: rotate(45deg);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Nav links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    /* ── Hero ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .hero {
      min-height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .hero-inner {
      max-width: 36rem; /* ~max-w-xl */
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Pill badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(240,182,94,0.10);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 4px 12px;
      margin-bottom: 28px;
      border: 1px solid rgba(240,182,94,0.18);
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* H1 */
    h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.12;
      color: var(--text-primary);
      text-shadow: 0 0 80px rgba(240,182,94,0.15);
      margin-bottom: 20px;
    }

    /* Subtitle */
    .subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 28rem;
      margin: 0 auto 36px;
    }

    /* CTA button */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #110f0d;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      height: 48px;
      padding: 0 2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 12px;
    }

    .cta-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    /* Sub-CTA label */
    .cta-sub {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .footer-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Prototype label — non-functional mockup marker per design rules */
    .prototype-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #92692a;
      background: rgba(240,182,94,0.08);
      border: 1px solid rgba(240,182,94,0.18);
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .hero {
        padding: 3rem 1.25rem;
      }

      .subtitle {
        font-size: 16px;
      }

      .nav-links {
        gap: 1rem;
      }

      .nav-links a {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <div class="nav-inner">
      <a href="#" class="wordmark">
        <span class="wordmark-diamond" aria-hidden="true"></span>
        ProductPilot
      </a>
      <ul class="nav-links">
        <li><a href="#">Projects</a></li>
        <li><a href="#">Sign In</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero -->
  <main>
    <section class="hero">
      <div class="hero-inner">
        <span class="badge">
          <span class="badge-dot" aria-hidden="true"></span>
          AI-Powered Product Development
        </span>

        <h1>From idea to implementation docs in minutes</h1>

        <p class="subtitle">
          Describe what you want to build. Get a complete PRD, wireframes, architecture, and dev guide.
        </p>

        <a href="#" class="cta-btn">Start Building →</a>
        <span class="cta-sub">No account required &middot; Free to try</span>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <span class="footer-text">Built with Claude AI</span>
    <span class="prototype-label">Prototype</span>
  </footer>

</body>
</html>
